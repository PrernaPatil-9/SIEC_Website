<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIEC – Shopping Cart</title>
  <meta name="description" content="View and manage your shopping cart." />
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  
  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Fraunces', serif;
    }
    .font-body {
      font-family: 'Inter', sans-serif;
    }
    .font-mono {
      font-family: 'IBM Plex Mono', monospace;
    }
    
    body {
      background: #f8fafc;
    }
    
    .cart-item {
      background: white;
      border-radius: 1rem;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid #f1f5f9;
    }
    
    .cart-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      border-color: rgba(34, 197, 94, 0.2);
    }
    
    .quantity-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      color: #0b1a2f;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .quantity-btn:hover {
      background: #e2e8f0;
      transform: scale(1.05);
    }
    
    .quantity-btn:active {
      transform: scale(0.95);
    }
    
    .remove-btn {
      color: #94a3b8;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .remove-btn:hover {
      color: #e53e3e;
      transform: scale(1.1);
    }
    
    .summary-card {
      background: white;
      border-radius: 1.25rem;
      border: 1px solid #f1f5f9;
      padding: 1.5rem;
      position: sticky;
      top: 100px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-state i {
      font-size: 4rem;
      color: #cbd5e1;
      margin-bottom: 16px;
    }
    
    .empty-state h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      color: #0b1a2f;
      margin-bottom: 8px;
    }
    
    .empty-state p {
      color: #94a3b8;
    }
    
    .hero-gradient {
      background: linear-gradient(145deg, #0b1a2f 0%, #1a314a 100%);
      position: relative;
      overflow: hidden;
    }
    
    .hero-gradient::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(34, 197, 94, 0.03) 40px, rgba(34, 197, 94, 0.03) 41px);
      pointer-events: none;
    }

    .stock-badge.in-stock {
      background: #e6f7e6;
      color: #1e7b3a;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .stock-badge.out-stock {
      background: #fee9e7;
      color: #b33a34;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div id="header"></div>

  <main>
    <!-- ===== HERO SECTION ===== -->
    <section class="hero-gradient py-16 px-6 text-center relative">
      <div class="max-w-4xl mx-auto relative z-10">
        <span class="inline-flex items-center gap-2 text-[#9bc76d] font-body text-[10px] uppercase tracking-[0.2em] font-medium mb-4">
          <span class="w-6 h-px bg-[#9bc76d]/50"></span>
          Your Cart
          <span class="relative flex h-1.5 w-1.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#22c55e] opacity-75"></span>
            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#22c55e]"></span>
          </span>
          <span class="w-6 h-px bg-[#9bc76d]/50"></span>
        </span>
        <h1 class="font-display text-3xl md:text-4xl lg:text-5xl font-bold text-white leading-[1.1]">
          Shopping <span class="bg-gradient-to-r from-[#4ade80] via-[#22c55e] to-[#4ade80] bg-clip-text text-transparent">Cart</span>
        </h1>
        <p class="font-body text-white/60 text-base max-w-2xl mx-auto mt-3 leading-relaxed">
          Review your items and proceed to checkout
        </p>
      </div>
    </section>

    <!-- ===== CART CONTENT ===== -->
    <div class="max-w-7xl mx-auto px-6 py-12">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Cart Items -->
        <div class="lg:col-span-2">
          <div class="flex items-center justify-between mb-6">
            <h2 class="font-display text-xl font-bold text-[#0b1a2f]">
              <span id="cartItemCount">0</span> Items
            </h2>
            <button id="clearCartBtn" class="text-sm text-red-500 hover:text-red-600 transition-colors flex items-center gap-1.5">
              <i class="fas fa-trash-alt"></i> Clear Cart
            </button>
          </div>
          
          <!-- Cart Items Container -->
          <div id="cartItemsContainer" class="space-y-4">
            <!-- Items will be injected here -->
          </div>
          
          <!-- Empty State -->
          <div id="emptyCartMessage" class="empty-state">
            <i class="fas fa-shopping-bag"></i>
            <h3>Your cart is empty</h3>
            <p>Browse our products and add items you love</p>
            <a href="/pages/products/products.html" class="inline-block mt-4 bg-[#22c55e] text-white px-6 py-2.5 rounded-full hover:bg-[#16a34a] transition-all duration-300 hover:shadow-lg">
              <i class="fas fa-arrow-left mr-2"></i> Continue Shopping
            </a>
          </div>
          
          <!-- Continue Shopping Link -->
          <div class="mt-6">
            <a href="/pages/products/products.html" class="text-[#22c55e] hover:text-[#16a34a] transition-colors flex items-center gap-2">
              <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
          </div>
        </div>
        
        <!-- Order Summary -->
        <div class="lg:col-span-1">
          <div class="summary-card">
            <h3 class="font-display text-lg font-bold text-[#0b1a2f] mb-4">Order Summary</h3>
            
            <div class="space-y-3 text-sm">
              <div class="flex justify-between">
                <span class="text-gray-600">Subtotal</span>
                <span id="subtotal" class="font-medium text-[#0b1a2f]">₹0.00</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">Shipping</span>
                <span class="text-[#22c55e] font-medium">Free</span>
              </div>
              <div class="flex justify-between border-t border-gray-200 pt-3 mt-3">
                <span class="font-bold text-[#0b1a2f]">Total</span>
                <span id="totalPrice" class="text-xl font-bold text-[#22c55e]">₹0.00</span>
              </div>
            </div>
            
            <!-- In your cart page, update the checkout button section -->
<button id="checkoutBtn" onclick="window.location.href='/pages/checkout/checkout.html'" class="w-full mt-6 bg-[#22c55e] text-white py-3 rounded-full font-semibold hover:bg-[#16a34a] transition-all duration-300 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
  <i class="fas fa-credit-card mr-2"></i> Proceed to Checkout
</button>
            
            <!-- Trust Badges -->
            <div class="mt-6 pt-4 border-t border-gray-100">
              <div class="flex justify-center gap-4 text-xs text-gray-500">
                <span class="flex items-center gap-1.5">
                  <i class="fas fa-lock text-[#22c55e]"></i> Secure Checkout
                </span>
                <span class="flex items-center gap-1.5">
                  <i class="fas fa-truck text-[#22c55e]"></i> Free Shipping
                </span>
                <span class="flex items-center gap-1.5">
                  <i class="fas fa-undo text-[#22c55e]"></i> Easy Returns
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <div id="footer"></div>

  <!-- ===== SCRIPTS ===== -->
  <!-- Load products first -->
  <script src="../../js/products.js"></script>
  <script src="../../js/utils.js"></script>
  
  <!-- Then cart and wishlist -->
  <script src="../../js/cart.js"></script>
  <script src="../../js/wishlist.js"></script>
  
  <!-- Then main -->
  <script src="../../js/main.js"></script>

  <!-- Header & Footer Loader -->
  <script>
    (function loadHeaderFooter() {
      // ===== LOAD HEADER =====
      const headerContainer = document.getElementById('header');
      if (headerContainer) {
        fetch('../../header/header.html')
          .then(response => {
            if (!response.ok) throw new Error('Header not found');
            return response.text();
          })
          .then(html => {
            headerContainer.innerHTML = html;
            if (typeof initHeader === 'function') {
              initHeader();
            }
          })
          .catch(() => {
            headerContainer.innerHTML = `
              <header class="bg-[#0b1a2f] text-white py-4 px-6">
                <div class="max-w-7xl mx-auto flex items-center justify-between">
                  <a href="/" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#22c55e] rounded-lg flex items-center justify-center font-bold text-lg">SIEC</div>
                    <span class="font-display text-xl font-semibold">SIEC</span>
                  </a>
                  <nav class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-white/70 hover:text-white transition">Home</a>
                    <a href="/pages/about/about.html" class="text-white/70 hover:text-white transition">About</a>
                    <a href="/pages/services/services.html" class="text-white/70 hover:text-white transition">Services</a>
                    <a href="/pages/products/products.html" class="text-[#22c55e] font-semibold">Products</a>
                    <a href="/pages/careers/careers.html" class="text-white/70 hover:text-white transition">Careers</a>
                    <a href="/pages/contact/contact.html" class="text-white/70 hover:text-white transition">Contact</a>
                  </nav>
                </div>
              </header>
            `;
          });
      }

      // ===== LOAD FOOTER =====
      const footerContainer = document.getElementById('footer');
      if (footerContainer) {
        fetch('../../footer/footer.html')
          .then(response => {
            if (!response.ok) throw new Error('Footer HTML not found');
            return response.text();
          })
          .then(html => {
            footerContainer.innerHTML = html;
          })
          .catch(() => {
            const footerScript = document.createElement('script');
            footerScript.src = '../../footer/footer.js';
            footerScript.onerror = function() {
              footerContainer.innerHTML = `
                <footer class="bg-[#0b1a2f] text-white/60 py-12 px-6">
                  <div class="max-w-7xl mx-auto text-center">
                    <p>&copy; 2026 SIEC. All rights reserved.</p>
                  </div>
                </footer>
              `;
            };
            document.body.appendChild(footerScript);
          });
      }
    })();
  </script>

  <script>
    // ===== OVERRIDE UTILS FORMAT PRICE WITH INR =====
    if (typeof Utils !== 'undefined') {
      Utils.formatPrice = function(num) {
        return '₹' + num.toFixed(2);
      };
    }

    // ===== CART PAGE SPECIFIC FUNCTIONS =====
    function renderCartPageItems() {
      const container = document.getElementById('cartItemsContainer');
      const emptyMessage = document.getElementById('emptyCartMessage');
      const itemCount = document.getElementById('cartItemCount');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('totalPrice');
      const checkoutBtn = document.getElementById('checkoutBtn');
      
      if (!container) return;
      
      // Get cart from global scope
      const cartItems = window.cart || [];
      
      console.log('Cart items:', cartItems); // Debug log
      
      // Clear container
      container.innerHTML = '';
      
      if (cartItems.length === 0) {
        emptyMessage.classList.remove('hidden');
        if (itemCount) itemCount.textContent = '0';
        if (subtotalEl) subtotalEl.textContent = '₹0.00';
        if (totalEl) totalEl.textContent = '₹0.00';
        if (checkoutBtn) checkoutBtn.disabled = true;
        return;
      }
      
      emptyMessage.classList.add('hidden');
      if (itemCount) itemCount.textContent = cartItems.length;
      if (checkoutBtn) checkoutBtn.disabled = false;
      
      // Calculate totals
      const subtotal = cartItems.reduce((total, item) => total + (item.price * item.qty), 0);
      if (subtotalEl) subtotalEl.textContent = '₹' + subtotal.toFixed(2);
      if (totalEl) totalEl.textContent = '₹' + subtotal.toFixed(2);
      
      // Render each cart item
      cartItems.forEach((item, index) => {
        const itemHTML = `
          <div class="cart-item cart-item-element p-4 flex flex-col sm:flex-row items-start sm:items-center gap-4" data-index="${index}">
            <img src="${item.img || 'https://placehold.co/100x100/1e293b/c9a84c?text=Product'}" alt="${item.name}" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">
            <div class="flex-1 min-w-0">
              <h4 class="font-semibold text-[#0b1a2f]">${item.name}</h4>
              <p class="text-sm text-gray-500">Price: ₹${item.price.toFixed(2)}</p>
              <div class="flex items-center gap-3 mt-2">
                <button class="quantity-btn cart-qty-btn" data-action="decrease" data-index="${index}">
                  <i class="fas fa-minus text-xs"></i>
                </button>
                <span class="text-sm font-medium min-w-[20px] text-center">${item.qty}</span>
                <button class="quantity-btn cart-qty-btn" data-action="increase" data-index="${index}">
                  <i class="fas fa-plus text-xs"></i>
                </button>
                <button class="remove-btn cart-remove-btn ml-2" data-index="${index}">
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>
            </div>
            <div class="text-right">
              <p class="font-bold text-[#22c55e]">₹${(item.price * item.qty).toFixed(2)}</p>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', itemHTML);
      });
      
      // Attach event listeners
      document.querySelectorAll('.cart-qty-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const index = parseInt(this.dataset.index);
          const action = this.dataset.action;
          const cartItems = window.cart || [];
          
          if (action === 'increase') {
            cartItems[index].qty += 1;
          } else if (action === 'decrease') {
            if (cartItems[index].qty > 1) {
              cartItems[index].qty -= 1;
            } else {
              cartItems.splice(index, 1);
            }
          }
          if (typeof saveCart === 'function') {
            saveCart();
          }
          renderCartPageItems();
        });
      });
      
      document.querySelectorAll('.cart-remove-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const index = parseInt(this.dataset.index);
          const cartItems = window.cart || [];
          cartItems.splice(index, 1);
          if (typeof saveCart === 'function') {
            saveCart();
          }
          renderCartPageItems();
        });
      });
    }

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Cart page loaded');
      
      // Initialize modules
      if (typeof initCart === 'function') {
        initCart();
      }
      
      // Render cart items
      setTimeout(function() {
        renderCartPageItems();
      }, 100);
      
      // Clear cart button
      document.getElementById('clearCartBtn')?.addEventListener('click', function() {
        if (confirm('Are you sure you want to clear your cart?')) {
          if (typeof clearCart === 'function') {
            clearCart();
          } else {
            window.cart = [];
            if (typeof saveCart === 'function') {
              saveCart();
            }
          }
          renderCartPageItems();
        }
      });
      
      // Checkout button
      document.getElementById('checkoutBtn')?.addEventListener('click', function() {
        const cartItems = window.cart || [];
        if (cartItems.length === 0) {
          alert('Your cart is empty!');
          return;
        }
        alert('Redirecting to checkout...');
        // window.location.href = '/pages/checkout/checkout.html';
      });
    });
  </script>

</body>
</html>
